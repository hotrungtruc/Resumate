version: "3.8"

services:
  # ==================== DATABASE ====================
  mongodb:
    image: mongo:7.0
    container_name: resumate-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-Truc123}
      MONGO_INITDB_DATABASE: resumate
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - resumate-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3

  # ==================== BACKEND ====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: "3.12"
    container_name: resumate-backend
    restart: unless-stopped
    environment:
      # Database
      MONGO_URI: ${MONGO_URI:-mongodb://admin:Truc123@mongodb:27017/resumate?authSource=admin}
      
      # JWT & Security
      JWT_SECRET: ${JWT_SECRET:-<strong-random-key-32-chars>}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      
      # OAuth Configuration
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-your-google-client-id.apps.googleusercontent.com}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-your-google-client-secret}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-your-facebook-app-id}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-your-facebook-app-secret}
      
      # CORS & API - include Docker container hostnames
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://frontend:5173,http://resumate-frontend:5173}
      ALLOWED_METHODS: ${ALLOWED_METHODS:-GET,POST,PUT,DELETE,PATCH}
      
      # Python Environment
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    
    ports:
      - "8000:8000"
    
    depends_on:
      mongodb:
        condition: service_healthy
    
    networks:
      - resumate-net
    
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3

  # ==================== FRONTEND ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_VERSION: "20-alpine"
    container_name: resumate-frontend
    restart: unless-stopped
    environment:
      # API Configuration - use Docker service name for container-to-container communication
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://backend:8000}
      
      # OAuth Configuration
      VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-your-google-client-id.apps.googleusercontent.com}
      VITE_FACEBOOK_APP_ID: ${VITE_FACEBOOK_APP_ID:-your-facebook-app-id}
      
      # Vite Configuration
      VITE_HOST: "0.0.0.0"
      VITE_PORT: "5173"
    
    ports:
      - "5173:5173"
    
    depends_on:
      backend:
        condition: service_started
    
    networks:
      - resumate-net
    
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5173"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3

# ==================== VOLUMES ====================
volumes:
  mongo_data:
    driver: local
  mongo_config:
    driver: local

# ==================== NETWORKS ====================
networks:
  resumate-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
